{% block title %}{{ project.title }}{% endblock %}

{% block content %}

<h1>{{ project.title }}</h1>

<p>{{ project.description }}</p>
{% if project.location %}
    <p><strong>Локация:</strong> {{ project.location }}</p>
{% endif %}

<!-- <hr> -->

<h3>Фотографии:</h3>

{% for image in project.images.all %}
    <img src="{{ image.image.url }}" width="400">
{% endfor %}

<br><br>
<a href="{% url 'project_list' %}">← Назад к проектам</a>

{% endblock %}
